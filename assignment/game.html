<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Little Red - Prototype</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
	<button id="collectionBtn" class="collection-btn" type="button" aria-haspopup="dialog" aria-controls="endingModal">
		Ending Collection
	</button>
	<a class="back-btn" href="index.html" aria-label="Back to home">
		<img src="pic/button5.png" alt="Back">
	</a>

	<main class="story-shell" aria-live="polite">
		<header class="story-header">
			<p class="chapter-label">Extended Story Prototype</p>
			<h1>Little Red: Voice in the Woods</h1>
		</header>

		<section class="story-card" aria-labelledby="sceneTitle">
			<h2 id="sceneTitle">Loading...</h2>
			<p id="sceneText"></p>
			<div id="choiceList" class="choice-list"></div>
			<button id="restartBtn" class="restart-btn" type="button" hidden>Restart Game</button>
		</section>
	</main>

	<div class="hud-stats" role="status" aria-label="Character status">
		<span id="confidenceStat">❤ Confidence: 0</span>
		<span id="observationStat">🔍 Observation: 0</span>
		<span id="trainingStat">💪 Training Intensity: 0</span>
		<span id="bondStat">🤝 Grandma Bond: 0</span>
	</div>

	<div id="endingModal" class="ending-modal" role="dialog" aria-modal="true" aria-labelledby="endingModalTitle" hidden>
		<div class="ending-modal-backdrop" data-close-modal="true"></div>
		<section class="ending-modal-panel">
			<div class="ending-modal-header">
				<h2 id="endingModalTitle">Collected Endings</h2>
				<button id="closeModalBtn" class="close-modal-btn" type="button" aria-label="Close ending modal">Close</button>
			</div>
			<p id="endingCollectionCount" class="ending-count">0 / 4 unlocked</p>
			<ul id="endingCollectionList" class="ending-collection-list"></ul>
		</section>
	</div>

	<script src="game.js"></script>
</body>
</html>
